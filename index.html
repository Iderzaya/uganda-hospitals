<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Uganda Hospitals</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.4.1/MarkerCluster.css" />
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.4.1/MarkerCluster.Default.css" />
        <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.4.1/leaflet.markercluster.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
        <script src="epicollect.js"></script>
        <link rel="stylesheet" href="style/style.css" />
        <link rel="stylesheet" href="style/epi_style.css" />
    </head>
    <body>
        <header>
            <h1>Uganda Hospitals</h1>
            <p>Hackathon Project</p>
        </header>
        <div class="container">
            <div id="map"></div>
            <div class="sidebar">
                <div class="sidebar-header feature-sidebar">Feature Details</div>
                <div class="sidebar-content">
                    <div class="no-selection">Click on a feature to view details</div>
                </div>
                <div class="sidebar-header collected-sidebar">Collected Data</div>
                <div class="sidebar-content">
                    <table class="hospital-table">
                        <tr>
                            <td>Total collected survey</td>
                            <td id="total-collected">0</td>
                        </tr>
                        <tr>
                            <td>See survey</td>
                            <td><button onclick="showEpicollect()">Open</button></td>
                        </tr>
                        <tr>
                            <td>Fetch latest</td>
                            <td>
                                <button id="fetch-btn" onclick="fetchEpiCollectData()">Refresh</button>
                                <div id="last-sync" style="font-size: 11px; color: #666; margin-top: 5px;"></div>
                            </td>
                        </tr>
                        <tr>
                            <td>Validate GPS</td>
                            <td>
                                <button id="validate-btn" onclick="validateLocations()">Validate</button>
                                <div id="last-validation" style="font-size: 11px; color: #666; margin-top: 5px;"></div>
                            </td>
                        </tr>
                        <tr>
                            <td>Detect Duplicates</td>
                            <td>
                                <button id="duplicate-btn" onclick="detectDuplicatePhotos()">Check Photos</button>
                                <div id="last-duplicate-check" style="font-size: 11px; color: #666; margin-top: 5px;"></div>
                            </td>
                        </tr>
                    </table>
                    <div id="fetch-status" style="margin-top: 10px; font-size: 12px; display: none;"></div>
                </div>
                <div class="sidebar-header hospital-sidebar">Hospital data</div>
                <div class="sidebar-content">
                    <table class="hospital-table">
                        <tr>
                            <td>Total Uganda hospitals</td>
                            <td>7,463</td>
                        </tr>
                        <tr>
                            <td>Total Kampala hospitals</td>
                            <td>2,447</td>
                        </tr>
                    </table>
                </div>
            </div>
        </div>
        <div id="epiCollectOverlay" class="epi-overlay">
            <div class="epiCollectTable">
                <button class="close-btn" onclick="closeEpicollect()">×</button>
                <h2>EpiCollect Data</h2>
                <div class="table-wrapper">
                    <table id="csvTable">
                        <thead></thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
        <script src="https://unpkg.com/georaster"></script>
        <script src="https://unpkg.com/georaster-layer-for-leaflet"></script>
        <script type="module" src="map.js"></script>
        <script>
            // Make sidebar sections foldable
            document.querySelectorAll('.sidebar-header').forEach(header => {
                header.style.cursor = 'pointer';
                header.style.userSelect = 'none';

                // Add toggle indicator
                header.innerHTML = '▼ ' + header.innerHTML;
                header.dataset.expanded = 'true';

                // Get next sibling content
                const content = header.nextElementSibling;
                if (content && content.classList.contains('sidebar-content')) {
                    header.addEventListener('click', function() {
                        const isExpanded = this.dataset.expanded === 'true';

                        if (isExpanded) {
                            content.style.display = 'none';
                            this.dataset.expanded = 'false';
                            this.innerHTML = '▶ ' + this.innerHTML.substring(2);
                        } else {
                            content.style.display = 'block';
                            this.dataset.expanded = 'true';
                            this.innerHTML = '▼ ' + this.innerHTML.substring(2);
                        }
                    });
                }
            });
        </script>
    </body>
</html>
